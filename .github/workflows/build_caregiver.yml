name: Build LoopCaregiver
on:
  workflow_dispatch:

env:
  GH_PAT: ${{ secrets.GH_PAT }}

jobs:
  build:
    name: Build Caregiver
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - name: Select Xcode version
        run: "sudo xcode-select --switch /Applications/Xcode_26.4.app/Contents/Developer"

      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive

      - name: Install Dependencies
        run: bundle install

      - name: Fastlane Build Caregiver
        run: bundle exec fastlane build_caregiver
        env:
          TEAMID: ${{ secrets.TEAMID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

      - name: Fastlane Release to TestFlight
        run: bundle exec fastlane release_caregiver
        env:
          TEAMID: ${{ secrets.TEAMID }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FASTLANE_KEY_ID: ${{ secrets.FASTLANE_KEY_ID }}
          FASTLANE_ISSUER_ID: ${{ secrets.FASTLANE_ISSUER_ID }}
          FASTLANE_KEY: ${{ secrets.FASTLANE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
